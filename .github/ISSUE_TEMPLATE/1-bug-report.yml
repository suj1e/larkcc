name: 🐛 Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        提交前请先搜索已有 Issue，如果找到相同的请点 👍 而不是重复提交。
        请确认你使用的是最新版本。

        如果你需要帮助或有问题想讨论，请前往 [Discussions](https://github.com/suj1e/larkcc/discussions)。

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: When I run larkcc...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `larkcc --setup`
        2. Configure with...
        3. Send message...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: larkcc Version
      description: Run `larkcc --version` or check package.json
      placeholder: "e.g. 0.11.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version`
      placeholder: "e.g. v22.x.x"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or screenshots (remove sensitive info)
      render: shell
