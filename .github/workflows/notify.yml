name: Feishu Notify

on:
  schedule:
    - cron: '30 3 * * *'   # UTC 03:30 = 北京 11:30
  workflow_dispatch:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: read
  pull-requests: read

jobs:
  # ── 每日汇总 ──────────────────────────────────
  daily-digest:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repo status
        id: status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          # 手动 Issues（排除 deps-update 标签）
          MANUAL=$(gh issue list -R "$REPO" --state open --json number,title,labels --jq '
            [ .[] | select([ .labels[].name ] | inside(["deps-update"]) | not) ]
          ')

          # 依赖更新 Issues
          DEPS=$(gh issue list -R "$REPO" --state open --label deps-update --json number,title --jq '.')

          # Open PRs
          PRS=$(gh pr list -R "$REPO" --state open --json number,title --jq '.')

          echo "manual<<EOF" >> $GITHUB_OUTPUT
          echo "$MANUAL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "deps<<EOF" >> $GITHUB_OUTPUT
          echo "$DEPS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "prs<<EOF" >> $GITHUB_OUTPUT
          echo "$PRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and send digest
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"

          # 解析数据
          MANUAL_COUNT=$(echo '${{ steps.status.outputs.manual }}' | jq 'length')
          DEPS_COUNT=$(echo '${{ steps.status.outputs.deps }}' | jq 'length')
          PRS_COUNT=$(echo '${{ steps.status.outputs.prs }}' | jq 'length')
          TOTAL=$((MANUAL_COUNT + DEPS_COUNT + PRS_COUNT))

          if [ "$TOTAL" -eq 0 ]; then
            BODY='{"msg_type":"interactive","card":{"header":{"title":{"tag":"plain_text","content":"📊 larkcc 每日巡检"},"template":"green"},"elements":[{"tag":"div","text":{"tag":"lark_md","content":"✅ 无未处理事项，一切正常！"}}]}}'
            curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$BODY"
            exit 0
          fi

          # 构建卡片 elements
          ELEMENTS='[]'

          # 手动 Issues
          if [ "$MANUAL_COUNT" -gt 0 ]; then
            ELEMENTS=$(echo "$ELEMENTS" | jq --argjson issues '${{ steps.status.outputs.manual }}' '
              . + [
                {"tag":"div","text":{"tag":"lark_md","content":"📌 **待处理 Issue:** \($issues | length) 个"}}
              ] + [
                .[] | empty
              ] + (
                $issues[:5] | map({
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "   - #\(.number) \(.title) (\([.labels[].name] | join(", ")))"
                  }
                })
              )
            ')
          fi

          # 依赖更新 Issues
          if [ "$DEPS_COUNT" -gt 0 ]; then
            ELEMENTS=$(echo "$ELEMENTS" | jq --argjson deps '${{ steps.status.outputs.deps }}' '
              . + [
                {"tag":"div","text":{"tag":"lark_md","content":"📦 **待适配依赖更新:** \($deps | length) 个"}}
              ] + (
                $deps[:5] | map({
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "   - #\(.number) \(.title)"
                  }
                })
              )
            ')
          fi

          # Open PRs
          if [ "$PRS_COUNT" -gt 0 ]; then
            ELEMENTS=$(echo "$ELEMENTS" | jq --argjson prs '${{ steps.status.outputs.prs }}' '
              . + [
                {"tag":"div","text":{"tag":"lark_md","content":"🔀 **待处理 PR:** \($prs | length) 个"}}
              ] + (
                $prs[:5] | map({
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "   - #\(.number) \(.title)"
                  }
                })
              )
            ')
          fi

          CARD=$(jq -n \
            --argjson elements "$ELEMENTS" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {tag: "plain_text", content: "📊 larkcc 每日巡检"},
                  template: "blue"
                },
                elements: $elements
              }
            }')

          curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$CARD"

  # ── 新 Issue 通知 ─────────────────────────────
  issue-notify:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          NUMBER="${{ github.event.issue.number }}"
          ACTOR="${{ github.actor }}"
          URL="${{ github.event.issue.html_url }}"
          BODY="${{ github.event.issue.body }}"

          # 截取前 300 字
          SUMMARY=$(echo "$BODY" | head -c 300)
          [ ${#BODY} -gt 300 ] && SUMMARY="${SUMMARY}..."

          LABELS="${{ join(github.event.issue.labels.*.name, ', ') }}"

          CARD=$(jq -n \
            --arg title "$TITLE" \
            --arg number "$NUMBER" \
            --arg actor "$ACTOR" \
            --arg url "$URL" \
            --arg summary "$SUMMARY" \
            --arg labels "$LABELS" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {tag: "plain_text", content: "📌 新 Issue #\($number): \($title)"},
                  template: "blue"
                },
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: "**标签:** \($labels)\n**提交者:** \($actor)"}},
                  {tag: "div", text: {tag: "lark_md", content: "\($summary)"}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "🔗 查看详情"}, url: $url, type: "primary"}]}
                ]
              }
            }')

          curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$CARD"

  # ── 新 PR 通知 ────────────────────────────────
  pr-notify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          NUMBER="${{ github.event.pull_request.number }}"
          ACTOR="${{ github.actor }}"
          URL="${{ github.event.pull_request.html_url }}"
          BODY="${{ github.event.pull_request.body }}"

          SUMMARY=$(echo "$BODY" | head -c 300)
          [ ${#BODY} -gt 300 ] && SUMMARY="${SUMMARY}..."

          CARD=$(jq -n \
            --arg title "$TITLE" \
            --arg number "$NUMBER" \
            --arg actor "$ACTOR" \
            --arg url "$URL" \
            --arg summary "$SUMMARY" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {tag: "plain_text", content: "🔀 新 PR #\($number): \($title)"},
                  template: "purple"
                },
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: "**提交者:** \($actor)"}},
                  {tag: "div", text: {tag: "lark_md", content: "\($summary)"}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "🔗 查看详情"}, url: $url, type: "primary"}]}
                ]
              }
            }')

          curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$CARD"

  # ── 新评论通知（过滤 bot）─────────────────────
  comment-notify:
    if: github.event_name == 'issue_comment' && !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          ACTOR="${{ github.actor }}"
          # 过滤 bot 用户
          if [[ "$ACTOR" == *"[bot]" ]]; then
            exit 0
          fi

          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          COMMENT_BODY="${{ github.event.comment.body }}"
          URL="${{ github.event.comment.html_url }}"
          IS_PR="${{ github.event.issue.pull_request }}"

          SUMMARY=$(echo "$COMMENT_BODY" | head -c 300)
          [ ${#COMMENT_BODY} -gt 300 ] && SUMMARY="${SUMMARY}..."

          TYPE="Issue"
          [ "$IS_PR" != "" ] && TYPE="PR"

          CARD=$(jq -n \
            --arg type "$TYPE" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg number "$ISSUE_NUMBER" \
            --arg actor "$ACTOR" \
            --arg url "$URL" \
            --arg summary "$SUMMARY" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {tag: "plain_text", content: "💬 新评论 on \($type) #\($number) \($issue_title)"},
                  template: "cyan"
                },
                elements: [
                  {tag: "div", text: {tag: "lark_md", content: "**评论者:** \($actor)"}},
                  {tag: "div", text: {tag: "lark_md", content: "\($summary)"}},
                  {tag: "action", actions: [{tag: "button", text: {tag: "plain_text", content: "🔗 查看详情"}, url: $url, type: "primary"}]}
                ]
              }
            }')

          curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$CARD"
