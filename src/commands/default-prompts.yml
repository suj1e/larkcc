# 内置 PROMPT 命令默认值
# 用户可在 ~/.larkcc/config.yml 的 commands 块中覆盖

review: "帮我 review 最近的 git diff，关注安全性、性能、代码质量，给出具体改进建议"
fix: "分析项目最近的报错日志或测试失败，找到根本原因并修复"
doc: "为当前项目生成或更新 README，包括项目介绍、安装、使用方法"
test: "为最近修改的文件生成单元测试"
explain: "解释当前项目的整体架构"
refactor: "找出项目中最需要重构的部分并重构"
commit: "分析当前 git diff，生成符合 Conventional Commits 规范的 commit message，直接输出，不要解释"
sync: |
  提交并推送代码到远程仓库。

  步骤：
  1. git add 所有变更
  2. 生成 commit message（遵循 Conventional Commits）
  3. git commit
  4. git push

  {input}
  （有输入时直接用作 commit message，无输入时自动分析 diff 生成）
pr: "基于当前分支的改动，生成详细的 PR 描述，包括改动说明、测试方案、注意事项"
todo: "扫描项目里所有的 TODO、FIXME、HACK 注释，整理成优先级清单并给出建议"
summary: "总结今天的代码改动，生成简洁的工作日报"
bsx: "先不动代码，我们头脑风暴，深度讨论方案与规划，并给出你需要确认的。"
build: "运行项目构建命令，如有报错帮我修复"
install: "安装依赖，如有问题帮我解决"
run: "列出 package.json 中可用的 scripts 并帮我选择"
quality: |
  代码质量检查，按维度输出问题和修复建议。

  检查维度：
  - 类型安全：any 滥用、类型错误、断言风险
  - 错误处理：异常捕获、边界情况、空值处理
  - 代码简洁：重复代码、冗余逻辑、可读性
  - 性能隐患：循环效率、内存泄漏、异步问题

  目标：{input}
  （无输入时检查 git diff 当前变更）

  输出格式：
  🔴 严重：...
  🟡 警告：...
  🟢 建议：...

  最后给出 1-10 分整体评价和一句话总结。

release: |
  基于 git diff 生成 CHANGELOG.md 变更内容，遵循 Keep a Changelog 格式。
  然后执行 ./release.sh {input}。

  {input} 可指定版本类型：patch / minor / major
  无输入时自动分析变更规模：
  - 只有文档/修复 → patch
  - 有新功能 → minor
  - 有 breaking change → major

check: |
  综合检查项目：类型检查、lint、测试。
  根据项目类型自动选择对应工具。

  {input}

security: |
  安全漏洞扫描，根据项目类型自动选择工具。

  {input}

deps: |
  检查过期依赖，根据项目类型自动选择工具。

  {input}
